{% extends 'tasks/base.html' %}
{% block content %}
<div class="page-header">
    <h1>Projects</h1>
    <a href="{% url 'project-create' %}" class="btn btn-primary"><i class="fas fa-plus"></i> New Project</a>
</div>

<div class="glass-panel">
    <div class="item-list">
        {% for project in projects %}
        <div class="list-item">
            <div class="item-info">
                <h4>{{ project.name }}</h4>
                <p>{{ project.description|truncatewords:20 }}</p>
                <p><small style="color: var(--text-secondary)">Tasks: {{ project.tasks.count }}</small></p>
            </div>
            <div class="item-actions">
                <a href="{% url 'project-update' project.pk %}" class="btn btn-secondary"><i class="fas fa-edit"></i></a>
                <a href="{% url 'project-delete' project.pk %}" class="btn btn-danger"><i class="fas fa-trash"></i></a>
            </div>
        </div>
        {% empty %}
        <p>No projects found. Create one to get started!</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
