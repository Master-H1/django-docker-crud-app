{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <i class="fas fa-cubes"></i>
                <span>TaskPro</span>
            </div>
            <nav class="nav-menu">
                <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="{% url 'project-list' %}" class="nav-link {% if 'project' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-folder"></i> Projects
                </a>
                <a href="{% url 'task-list' %}" class="nav-link {% if 'task' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-check-square"></i> Tasks
                </a>
            </nav>
        </aside>
        
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
